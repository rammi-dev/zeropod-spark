# ZeroPod Resource Resizer Controller
# Uses kopf framework to watch pods and resize on checkpoint/restore
#
# Build:   docker build -t zeropod-resizer:latest components/zeropod-resizer/
# Deploy:  kubectl apply -f components/zeropod-resizer/deploy.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zeropod-resizer
  namespace: zeropod-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zeropod-resizer
rules:
# Pod read/watch/patch for annotation and resize
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "patch"]
# In-place resize subresource (KEP-1287)
- apiGroups: [""]
  resources: ["pods/resize"]
  verbs: ["patch"]
# Events for kopf status reporting
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create"]
# kopf leader election
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zeropod-resizer
subjects:
- kind: ServiceAccount
  name: zeropod-resizer
  namespace: zeropod-system
roleRef:
  kind: ClusterRole
  name: zeropod-resizer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeropod-resizer
  namespace: zeropod-system
  labels:
    app: zeropod-resizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zeropod-resizer
  template:
    metadata:
      labels:
        app: zeropod-resizer
    spec:
      serviceAccountName: zeropod-resizer
      containers:
      - name: resizer
        image: zeropod-resizer:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: WATCH_NAMESPACE
          value: "spark-workload"
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
