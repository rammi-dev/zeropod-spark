# Phase 2: ZeroPod resource resizer controller
# TODO: implement controller.py first, build and push Docker image
#
# This is a placeholder — the controller watches ZeroPod checkpoint/restore
# events and resizes pod resource requests using KEP-1287 in-place resize.
#
# Prerequisites:
#   - K8s 1.33+ (in-place resize Beta)
#   - ZeroPod installed
#   - Pods with resizePolicy: NotRequired

# Placeholder deployment - update image after building controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zeropod-resizer
  namespace: zeropod-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zeropod-resizer
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "patch"]
- apiGroups: [""]
  resources: ["pods/resize"]
  verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zeropod-resizer
subjects:
- kind: ServiceAccount
  name: zeropod-resizer
  namespace: zeropod-system
roleRef:
  kind: ClusterRole
  name: zeropod-resizer
  apiGroup: rbac.authorization.k8s.io
