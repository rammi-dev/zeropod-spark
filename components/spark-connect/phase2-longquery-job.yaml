apiVersion: batch/v1
kind: Job
metadata:
  name: phase2-long-query
  namespace: spark-workload
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: notebook
        image: python:3.12-slim
        command: ["/bin/sh", "-c"]
        args: ["pip install -q 'pyspark[connect]' && python3 -u /opt/test/test-long-query.py"]
        volumeMounts:
        - name: test-script
          mountPath: /opt/test
      volumes:
      - name: test-script
        configMap:
          name: phase2-longquery-script
